[profile.default]
src = "src"
out = "out"
libs = ["lib", "node_modules"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
ffi = false
fuzz = { runs = 256 }
invariant = { runs = 256, depth = 15 }

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
    "@prb/math/=lib/prb-math/src/",
]

[profile.ci]
fuzz = { runs = 1000 }
invariant = { runs = 1000, depth = 50 }

[rpc_endpoints]
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"
hyperevm_testnet = "${HYPEREVM_TESTNET_RPC_URL}"

[etherscan]
base_sepolia = { key = "${BASESCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api", chain = 84532 }
# hyperevm_testnet = { key = "", url = "https://testnet.purrsec.com/api", chain = 998 }
