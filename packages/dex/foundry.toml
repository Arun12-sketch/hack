[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.7.6"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
auto_detect_solc = true
remappings = [
  "forge-std/=lib/forge-std/src/",
  "@uniswap/v3-core/contracts/=src/v3-core/",
  "@uniswap/v3-periphery/contracts/=src/v3-periphery/",
  "@uniswap/v2-core/contracts/=src/v2-core/",
  "@uniswap/lib/contracts/=lib/uniswap-lib/",
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "base64-sol/=lib/base64-sol/",
]
