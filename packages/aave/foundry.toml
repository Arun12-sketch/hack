[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.10"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
remappings = [
  "forge-std/=lib/forge-std/src/",
  "@aave/core-v3/=src/aave-v3-core/",
  "@aave/periphery-v3/=src/aave-v3-periphery/",
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]
